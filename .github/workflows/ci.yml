name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats
      - name: Compile schema (well-formed JSON Schema)
        run: ajv-cli compile -s schema/sponsored-products-bulk-sheet.schema.json --spec=draft2020
      - name: Validate example CSVs against schema
        run: |
          for f in examples/*.csv; do
            echo "Validating $f"
            # Strip header + parse each row → JSON Lines, validate each
            # (ajv-cli doesn't natively read CSV; use a small node helper)
            node -e "
              const fs=require('fs'),Ajv=require('ajv'),addFormats=require('ajv-formats');
              const csv=fs.readFileSync('$f','utf8').trim().split(/\r?\n/);
              const cols=csv[0].split(',');
              const ajv=new Ajv({allErrors:true,strict:false});
              addFormats(ajv);
              const validate=ajv.compile(JSON.parse(fs.readFileSync('schema/sponsored-products-bulk-sheet.schema.json','utf8')));
              let bad=0;
              csv.slice(1).forEach((line,i)=>{
                const vals=line.match(/(?:\"[^\"]*\"|[^,])*/g).filter((_,j)=>j%2===0);
                const row={};
                cols.forEach((c,j)=>{const v=(vals[j]||'').replace(/^\"|\"$/g,'');row[c]=v===''?null:v;});
                ['Daily Budget','Ad Group Default Bid','Bid'].forEach(k=>{if(row[k]!==null)row[k]=parseFloat(row[k]);});
                ['Percentage','Shopper Cohort Percentage'].forEach(k=>{if(row[k]!==null)row[k]=parseInt(row[k]);});
                if(!validate(row)){console.log('row',i+2,row.Entity,validate.errors[0]);bad++;}
              });
              if(bad)process.exit(1);
              console.log('  ✓ all rows valid');
            "
          done
